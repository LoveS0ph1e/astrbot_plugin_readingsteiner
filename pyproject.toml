# 工具链配置（非打包配置）：ruff + pytest
# 插件由 AstrBot 直接加载，不作为 PyPI 包发布，故此处只配置开发工具。

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B"]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
